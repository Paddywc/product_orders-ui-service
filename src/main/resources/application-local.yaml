security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8083/.well-known/jwks.json

store:
  currency: "USD"

services:
  product-service:
    base-url: http://localhost:8082
  order-service:
    base-url: http://localhost:8081
  auth-service:
    base-url: http://localhost:8083
  payment-service:
    base-url: http://localhost:8088



management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info