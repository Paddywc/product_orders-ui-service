<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(${product.name()}, ~{::section})}">
<body>
<section>
    <div class="row g-4">
        <div class="col-12">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-2">
                    <li class="breadcrumb-item">
                        <a th:href="@{/}" th:text="#{app.title}"></a>
                    </li>
                    <li class="breadcrumb-item">
                        <a th:href="@{/products}" th:text="#{nav.products}"></a>
                    </li>
                    <li class="breadcrumb-item active" aria-current="page" th:text="${product.name()}"></li>
                </ol>
            </nav>

            <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
                <div>
                    <h1 class="h3 mb-1" th:text="${product.name()}"></h1>
                </div>

                <div class="text-end">
                    <div class="fs-4 fw-semibold" th:text="${product.priceFormatted()}"></div>
                    <span class="badge"
                          th:classappend="${product.active()} ? ' text-bg-success' : ' text-bg-secondary'"
                          th:text="${product.active()} ? #{product.active} : #{product.inactive}">
                        Active
                    </span>
                </div>
            </div>

            <hr class="my-4">
        </div>

        <div class="col-12 col-lg-8" th:if="${!#strings.isEmpty(product.description())}">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="h5 card-title mb-3" th:text="#{product.description.title}"></h2>

                    <p class="card-text mb-0" th:text="${product.description()}">Product description</p>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="h5 card-title mb-3" th:text="#{product.details.title}"></h2>

                    <dl class="row mb-0">
                        <dt class="col-5 text-muted" th:text="#{product.category.title}"></dt>
                        <dd class="col-7 mb-2" th:text="${product.category()}"></dd>

                        <dt class="col-5 text-muted">Status</dt>
                        <dd class="col-7 mb-2">
                            <span class="badge"
                                  th:classappend="${product.active()} ? ' text-bg-success' : ' text-bg-secondary'"
                                  th:text="${product.active()} ? #{product.active} : #{product.inactive}">
                                Active
                            </span>
                        </dd>

                        <dt class="col-5 text-muted">Price</dt>
                        <dd class="col-7 mb-0" th:text="${product.priceFormatted()}"></dd>
                    </dl>
                </div>
            </div>

            <div class="d-grid gap-2 mt-3">
                <a class="btn btn-outline-secondary" th:href="@{/products}" th:text="#{nav.back.products}"></a>
            </div>
        </div>
    </div>
</section>
</body>
</html>
