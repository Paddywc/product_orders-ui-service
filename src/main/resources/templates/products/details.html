<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(${product.name}, ~{::section})}">
<body>
<section id="product-details-section">
    <div class="row details-grid">
        <div class="col-12">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb breadcrumb-trail">
                    <li class="breadcrumb-item">
                        <a th:href="@{/}" th:text="#{app.title}"></a>
                    </li>
                    <li class="breadcrumb-item">
                        <a th:href="@{/products}" th:text="#{nav.products}"></a>
                    </li>
                    <li class="breadcrumb-item active" aria-current="page" th:text="${product.name}"></li>
                </ol>
            </nav>

            <div class="product-header">
                <div>
                    <h1 class="product-title" th:text="${product.name}"></h1>
                </div>

                <div class="product-meta">
                    <div class="product-price-hero" th:text="${product.priceFormatted}"></div>
                    <span class="badge status-badge"
                          th:classappend="${product.active} ? ' status-badge--active' : ' status-badge--inactive'"
                          th:text="${product.active} ? #{product.active} : #{product.inactive}">
                        Active
                    </span>
                </div>
            </div>

            <hr class="section-divider">
        </div>

        <div class="col-12 col-lg-8" th:if="${!#strings.isEmpty(product.description)}">
            <div class="card app-card">
                <div class="card-body">
                    <h2 class="card-title card-section-title" th:text="#{product.description.title}"></h2>

                    <p class="card-text card-text-tight" th:text="${product.description}"></p>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-4">
            <div class="card app-card">
                <div class="card-body">
                    <h2 class="card-title card-section-title" th:text="#{product.details.title}"></h2>

                    <dl class="row details-list">
                        <dt class="col-5 details-term" th:text="#{product.category.title}"></dt>
                        <dd class="col-7 details-value" th:text="${product.category}"></dd>

                        <dt class="col-5 details-term" th:text="#{product.status.title}"></dt>
                        <dd class="col-7 details-value">
                            <span class="badge status-badge"
                                  th:classappend="${product.active} ? ' status-badge--active' : ' status-badge--inactive'"
                                  th:text="${product.active} ? #{product.active} : #{product.inactive}">
                                Active
                            </span>
                        </dd>

                        <dt class="col-5 details-term" th:text="#{product.price.title}"></dt>
                        <dd class="col-7 details-value-last" th:text="${product.priceFormatted}"></dd>
                    </dl>
                </div>
            </div>

            <div class="card app-card card-spaced">
                <div class="card-body">
                    <h2 class="card-title card-section-title" th:text="#{cart.add.title}"></h2>

                    <form class="row add-form" th:action="@{/cart/add}" method="post">
                        <input type="hidden" name="productId" th:value="${product.productId}"/>

                        <div class="col-5">
                            <label class="form-label form-label-tight" for="qty" th:text="#{cart.add.amount}"></label>
                            <input class="form-control"
                                   id="qty"
                                   name="quantity"
                                   type="number"
                                   min="1"
                                   step="1"
                                   value="1"
                                   th:disabled="${!product.active}"/>
                        </div>

                        <div class="col-7 col-action">
                            <button class="btn btn-primary"
                                    type="submit"
                                    th:disabled="${!product.active}"
                                    th:text="#{cart.add.submit}">
                            </button>
                        </div>

                        <div class="col-12" th:if="${!product.active}">
                            <small class="inactive-hint" th:text="#{cart.add.inactiveHint}"></small>
                        </div>
                    </form>
                </div>
            </div>

            <div class="back-actions">
                <a class="btn btn-outline-secondary" th:href="@{/products}" th:text="#{nav.back.products}"></a>
            </div>
        </div>
    </div>
</section>
</body>
</html>
